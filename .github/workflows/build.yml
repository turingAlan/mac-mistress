name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g. 1.2.0)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build:
    name: Build macOS App & DMG
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          elif [[ -n "${{ github.event.inputs.version }}" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="0.0.0-dev"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "📌 Version: ${VERSION}"

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Build & Package DMG
        run: |
          chmod +x scripts/build-dmg.sh
          VERSION="${{ steps.version.outputs.version }}" ./scripts/build-dmg.sh

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: MacMistress-${{ steps.version.outputs.version }}
          path: build/MacMistress-${{ steps.version.outputs.version }}.dmg

      - name: Update README version badge
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # Update the download badge version
          sed -i '' -E "s/Download_Mac_Mistress-v[0-9]+\.[0-9]+\.[0-9]+/Download_Mac_Mistress-v${VERSION}/g" README.md
          sed -i '' -E "s/alt=\"Download Mac Mistress v[0-9]+\.[0-9]+\.[0-9]+\"/alt=\"Download Mac Mistress v${VERSION}\"/g" README.md
          # Update Info.plist version
          sed -i '' -E "s/<string>[0-9]+\.[0-9]+\.[0-9]+<\/string>/<string>${VERSION}<\/string>/g" Sources/Info.plist

      - name: Commit version updates
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md Sources/Info.plist
          git diff --cached --quiet || git commit -m "chore: bump version to v${{ steps.version.outputs.version }}"
          git push origin HEAD:main

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: Mac Mistress ${{ steps.version.outputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: build/MacMistress-${{ steps.version.outputs.version }}.dmg
